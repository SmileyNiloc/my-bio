name: Upload Resume to Reactive Resume

on:
  push:
    branches:
      - main
    paths:
      - "data/resume.json" # only triggers when resume changes
      - .github/workflows/reactive_resume.yml # also trigger when workflow file changes, for testing purposes
      - .github/scripts/convert_resume.py # also trigger when conversion script changes, for testing purposes

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert JSON to Reactive Resume v5 format
        run: python3 .github/scripts/convert_resume.py

      - name: Import resume to Reactive Resume
        run: |
          curl --request POST \
            --url https://rxresu.me/api/openapi/resumes/import \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.REACTIVE_RESUME_API_KEY }}" \
            --data @data/rx-payload.json \
            --fail --show-error
